---
services:
  piano-learning:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        AUDIVERIS_VERSION: "5.7.1"
    image: piano-learning:latest
    container_name: piano-learning
    working_dir: /app
    environment:
      # Load from host .env if present
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONUNBUFFERED=1
      - QT_QPA_PLATFORM=offscreen
    volumes:
      # Mount only the user workspace for inputs/outputs; code is baked in the image
      - ./user:/app/user
    # Run as the invoking user so outputs aren't root-owned
    user: "${UID:-1000}:${GID:-1000}"
    # Keep the container running; you can override with "docker compose run" commands
    command: ["bash", "-lc", "tail -f /dev/null"]
    healthcheck:
      test: [
        "CMD",
        "bash",
        "-lc",
        # yamllint disable-line rule:line-length
        "audiveris -version >/dev/null 2>&1 && lilypond --version >/dev/null 2>&1 && musescore --version >/dev/null 2>&1 && python3 -c 'import music21; print(music21.__version__)' >/dev/null 2>&1"
      ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
