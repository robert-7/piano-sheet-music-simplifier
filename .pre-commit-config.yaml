---
# Adding plugins: https://pre-commit.com/#plugins

repos:

  # general linting
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: fix-byte-order-marker
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: '^docs/.*\.svg$'
      - id: mixed-line-ending
        args: ['--fix=lf']
        description: Forces to replace line ending by the UNIX 'lf' character.
      - id: pretty-format-json
        args: ['--no-sort-keys', '--autofix']

  - repo: https://github.com/sirosen/texthooks
    rev: 0.7.1
    hooks:
      - id: fix-smartquotes
      - id: fix-spaces
      - id: fix-unicode-dashes

  # python linting
  - repo: https://github.com/asottile/reorder_python_imports
    rev: v3.15.0
    hooks:
      - id: reorder-python-imports

  # markdown linting
  - repo: https://github.com/markdownlint/markdownlint
    rev: v0.13.0
    hooks:
      - id: markdownlint
        args: ['--style', '.markdownlint.rb']
        # Ensure pre-commit uses the system Ruby (e.g., /usr/bin/ruby 3.2)
        # instead of looking for a specific rubyX.Y binary like /usr/bin/ruby3.0
        language_version: system

  # python linting
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.20.0
    hooks:
      - id: pyupgrade

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
        entry: yamllint -c .yamllint.yaml .

  # local hook: validate the README Mermaid diagram
  - repo: local
    hooks:
      - id: diagram-validate
        name: Validate Mermaid diagram in README
        entry: bash scripts/diagram.sh --check
        language: system
        files: README.md
